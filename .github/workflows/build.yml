name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-api:
    name: Build .NET API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore PayBySharePay.sln

      - name: Build
        run: dotnet build PayBySharePay.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PayBySharePay.sln --configuration Release --no-build --verbosity normal

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Frontend.PayBySharePay/package-lock.json

      - name: Install dependencies
        working-directory: src/Frontend.PayBySharePay
        run: npm ci

      - name: Build (production)
        working-directory: src/Frontend.PayBySharePay
        run: npx ng build --configuration production

  build-merchantdemo:
    name: Build MerchantDemo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check_pkg
        run: |
          if [ -f "src/Frontend.MerchantDemo/package.json" ]; then
            echo "has_npm=true" >> $GITHUB_OUTPUT
          else
            echo "has_npm=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.has_npm == 'true'
        working-directory: src/Frontend.MerchantDemo
        run: npm ci

      - name: Build MerchantDemo
        if: steps.check_pkg.outputs.has_npm == 'true'
        working-directory: src/Frontend.MerchantDemo
        run: npx ng build --configuration production
