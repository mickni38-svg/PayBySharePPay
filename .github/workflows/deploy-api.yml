name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Miljø (test eller prod)'
        required: true
        type: choice
        options:
          - test
          - prod

jobs:
  deploy:
    name: Deploy .NET API til ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish API
        run: |
          dotnet publish src/Api.PayBySharePay/Api.PayBySharePay.csproj \
            --configuration Release \
            --output ./publish-output

      - name: Zip output
        run: zip -r publish-output.zip ./publish-output

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy til TEST
        if: github.event.inputs.environment == 'test'
        run: |
          az webapp deploy \
            --resource-group paybysharepay-rg \
            --name paybysharepay-api \
            --src-path publish-output.zip \
            --type zip
          echo "API deployed til: https://paybysharepay-api.azurewebsites.net"

      - name: Deploy til PROD
        if: github.event.inputs.environment == 'prod'
        run: |
          az webapp deploy \
            --resource-group paybysharepay-rg \
            --name paybysharepay-api-win \
            --src-path publish-output.zip \
            --type zip
          echo "API deployed til: https://paybysharepay-api-win.azurewebsites.net"
