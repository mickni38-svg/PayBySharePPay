name: Deploy Frontend til Azure Static Web Apps

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Frontend.PayBySharePay/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer dependencies
        run: npm ci
        working-directory: src/Frontend.PayBySharePay

      - name: Byg Angular app
        run: npx ng build --configuration production
        working-directory: src/Frontend.PayBySharePay

      - name: Deploy til Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/Frontend.PayBySharePay
          output_location: dist/frontend.pay-by-share-pay/browser
